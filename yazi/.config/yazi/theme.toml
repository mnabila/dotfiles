# If the user's terminal is in dark mode, Yazi will load `theme-dark.toml` on startup; otherwise, `theme-light.toml`.
# You can override any parts of them that are not related to the dark/light mode in your own `theme.toml`.

# If you want to dynamically override their content based on dark/light mode, you can specify two different flavors
# for dark and light modes under `[flavor]`, and do so in those flavors instead.
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "cyan" }

find_keyword = { fg = "yellow", bold = true, italic = true, underline = true }
find_position = { fg = "magenta", bg = "reset", bold = true, italic = true }

symlink_target = { italic = true }

marker_copied = { fg = "lightgreen", bg = "lightgreen" }
marker_cut = { fg = "lightred", bg = "lightred" }
marker_marked = { fg = "lightcyan", bg = "lightcyan" }
marker_selected = { fg = "lightyellow", bg = "lightyellow" }

count_copied = { fg = "white", bg = "green" }
count_cut = { fg = "white", bg = "red" }
count_selected = { fg = "white", bg = "yellow" }

border_symbol = " "
border_style = { fg = "gray" }

# Highlighting
syntect_theme = ""

# : }}}


# : Manager {{{

[indicator]
parent = { fg = "black", bg = "white" }
current = { fg = "black", bg = "white" }
preview = { hidden = true }
padding = { open = "в–Ҳ", close = "в–Ҳ" }


# : Tabs {{{

[tabs]
active = { bg = "gray", fg = "black", bold = true }
inactive = { fg = "reset", bg = "reset" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { bg = "reset", bold = true }
normal_alt = { fg = "reset", bg = "reset" }

# Select mode
select_main = { bg = "red", bold = true }
select_alt = { fg = "red", bg = "gray" }

# Unset mode
unset_main = { bg = "red", bold = true }
unset_alt = { fg = "red", bg = "gray" }

# : }}}


# : Status bar {{{

[status]
overall = {}
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep = { fg = "darkgray" }
perm_type = { fg = "green" }
perm_read = { fg = "yellow" }
perm_write = { fg = "red" }
perm_exec = { fg = "cyan" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "blue", bg = "black" }
progress_error = { fg = "red", bg = "black" }

# : }}}


# : Which {{{

[which]
cols = 3
mask = { bg = "black" }
cand = { fg = "lightcyan" }
rest = { fg = "darkgray" }
desc = { fg = "lightmagenta" }
separator = " оӘң "
separator_style = { fg = "darkgray" }

# : }}}


# : Confirmation {{{

[confirm]
border = { fg = "blue" }
title = { fg = "blue" }
content = {}
list = {}
btn_yes = { reversed = true }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "blue" }
title = { fg = "blue" }

# Table
tbl_col = { fg = "blue" }
tbl_cell = { fg = "yellow", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info = { fg = "green" }
title_warn = { fg = "yellow" }
title_error = { fg = "red" }

# Icons
icon_info = "пҒҡ"
icon_warn = "пҒұ"
icon_error = "пҒ—"

# : }}}


# : Picker {{{

[pick]
border = { fg = "blue" }
active = { fg = "magenta", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border = { fg = "blue" }
title = {}
value = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "blue" }
active = { reversed = true }
inactive = {}

# Icons
icon_file = "п…ӣ"
icon_folder = "п„•"
icon_command = "п’ү"

# : }}}


# : Task manager {{{

[tasks]
border = { fg = "blue" }
title = {}
hovered = { fg = "magenta", underline = false }

# : }}}


# : Help menu {{{

[help]
on = { fg = "cyan" }
run = { fg = "magenta" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "black", bg = "white" }

# : }}}


# : File-specific styles {{{

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "yellow" },

  # Media
  { mime = "{audio,video}/*", fg = "magenta" },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red" },

  # Documents
  { mime = "application/{pdf,doc,rtf}", fg = "cyan" },

  # Empty files
  # { mime = "inode/empty", fg = "red" },

  # Special files
  { name = "*", is = "orphan", bg = "red" },
  { name = "*", is = "exec", fg = "green" },

  # Dummy files
  { name = "*", is = "dummy", bg = "red" },
  { name = "*/", is = "dummy", bg = "red" },

  # Fallback
  # { name = "*", fg = "white" },
  { name = "*/", fg = "blue" },
]

# : }}}


